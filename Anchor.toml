[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
liminal = "AHJnF6Ppec39gEfLnkHtMk11V23gwYPfKa3C6F88bbkD"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 20000

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/liminal.ts tests/liminal-oracle.ts"
# Requires a validator with real Kamino mainnet state cloned in - see
# README.md's "Kamino yield routing" section. Not part of `anchor test`.
test-yield = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/liminal-yield.ts"

[hooks]
