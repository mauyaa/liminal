# Keeps the system self-driving with no external scheduler: every 5 minutes
# this hits the autonomous endpoints - webhook delivery, subscription
# billing, expired-escrow refunds, and unchallenged-delivery finalization.
# Requires the CRON_SECRET repo secret
# (same value as the Vercel env var). workflow_dispatch is there so a run
# can be triggered manually to verify the wiring.
name: pollers

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll webhooks, billing, and refunds
        run: |
          set -e
          for p in webhooks subscriptions refunds deliveries; do
            echo "== /api/$p/poll =="
            curl -sS --fail-with-body \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "https://app-eight-lovat-94.vercel.app/api/$p/poll"
            echo
          done
